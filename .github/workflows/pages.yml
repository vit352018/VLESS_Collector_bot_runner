name: 🌐 Deploy Stats Page to GitHub Pages

on:
  # Запускается после успешного завершения основного воркфлоу
  workflow_run:
    workflows: ["🔄 Collect & Test VPN Configs"]
    types: [completed]
  # Также можно запустить вручную
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main   # берём свежий main после коммита коллектора

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload output/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
